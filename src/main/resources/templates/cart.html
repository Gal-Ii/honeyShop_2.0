<!DOCTYPE html>
<html lang='bg' xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>HoneyShop - Количка</title>
    <link rel='stylesheet' th:href="@{/css/style.css}">
</head>
<body>
<div class='top-strip'>🐝 Добре дошли в HoneyShop — натурален мед и пчелни продукти</div>
<header class='site-header'>
    <div th:with="activePage='cart'"
         th:replace="fragments/navigation_bar :: nav-bar">
    </div>
</header>
<section class='page-hero'>
    <div class='container'><h1>Количка</h1>
        <p>Примерна страница за продуктите, избрани от клиента.</p></div>
</section>
<section class='section'>
    <div class='container'>
        <div class='table-card'>
            <div class='table-responsive'>
                <table>
                    <thead>
                    <tr>
                        <th>Продукт</th>
                        <th>Количество</th>
                        <th>Цена</th>
                        <th>Общо</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td th:text="${item.productName}">Акациев мед</td>
                        <td th:text="${item.quantity}">2</td>
                        <td th:text="${item.price}">12.00 лв.</td>
                        <td th:text="${item.totalPrice}">24.00 лв.</td>
                           <td>
                                <form th:action="@{/cart/{id}/delete(id=${item.id})}" method="post">
                                <button class='btn' >Изтрии</button>
                                </form>
                            </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class='total'>Крайна сума: <span th:text="${totalPrice}"></span> лв.</div>
            <div th:if="${orderError}" class="error-message" th:text="${orderError}"></div>
            <a th:href="@{/products}" class='btn light'>Продължи пазаруването</a>
            <form th:action="@{/orders}" method="post">
                <button class='btn' type="submit">Поръчай</button>
            </form>
        </div>
    </div>
</section>
<footer class='site-footer'><p>&copy; 2026 HoneyShop. Всички права запазени.</p></footer>
</body>
</html>
